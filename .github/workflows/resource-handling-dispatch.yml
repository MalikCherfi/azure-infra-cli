name: Resource Handling Dispatch

on:
    workflow_dispatch:
        inputs:
            targets:
                description: "Quel service Azure voulez-vous gérer ?"
                required: true
                type: choice
                options:
                    - app-service
                    - azure-function
                    - both

            app_service_action:
                description: "Action App Service (si app-service ou both)"
                required: false
                type: choice
                options:
                    - N/A
                    - create
                    - delete

            function_action:
                description: "Action Azure Function (si azure-function ou both)"
                required: false
                type: choice
                options:
                    - N/A
                    - create
                    - delete

jobs:
    validate:
        runs-on: ubuntu-latest
        steps:
            - name: Validate inputs
              run: |
                  TARGET="${{ github.event.inputs.targets }}"
                  APP_ACTION="${{ github.event.inputs.app_service_action }}"
                  FUNC_ACTION="${{ github.event.inputs.function_action }}"

                  echo "🔹 Target: $TARGET"
                  echo "🔹 App Service Action: $APP_ACTION"
                  echo "🔹 Function Action: $FUNC_ACTION"

                  if [[ "$TARGET" == "app-service" || "$TARGET" == "both" ]]; then
                    if [[ "$APP_ACTION" == "N/A" ]]; then
                      echo "❌ Vous devez choisir une action pour App Service"
                      exit 1
                    fi
                  fi

                  if [[ "$TARGET" == "azure-function" || "$TARGET" == "both" ]]; then
                    if [[ "$FUNC_ACTION" == "N/A" ]]; then
                      echo "❌ Vous devez choisir une action pour Azure Function"
                      exit 1
                    fi
                  fi

                  echo "✅ Inputs valides"

    manage-app-service:
        needs: validate
        runs-on: ubuntu-latest
        if: github.event.inputs.targets == 'app-service' || github.event.inputs.targets == 'both'
        permissions:
            id-token: write
            contents: read

        steps:
            # ── 1. Récupération du code ──────────────────────────────
            - name: Checkout code
              uses: actions/checkout@v4

            # ── 2. Login to Azure ────────────────────────────────────
            - name: Login to Azure
              uses: azure/login@v2
              with:
                  client-id: ${{ secrets.AZURE_CLIENT_ID }}
                  tenant-id: ${{ secrets.AZURE_TENANT_ID }}
                  subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

            # ── 3. Création et déploiement de la Web App ─────────────
            - name: Create and Deploy Web App
              if: github.event.inputs.app_service_action == 'create'
              run: |
                  chmod +x azure-app-service/create-azure-app-service.sh
                  ./azure-app-service/create-azure-app-service.sh

            # ── 3. Suppression de la Web App ─────────────────────────
            - name: Delete Web App
              if: github.event.inputs.app_service_action == 'delete'
              run: |
                  chmod +x azure-app-service/delete-azure-app-service.sh
                  ./azure-app-service/delete-azure-app-service.sh

            # ── 5. Logout ────────────────────────────────────────────
            - name: Logout
              if: always()
              run: az logout
