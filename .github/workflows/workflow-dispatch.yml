name: Deploy to Azure

on:
  workflow_dispatch:
    inputs:
      targets:
        description: 'Que voulez-vous déployer ?'
        required: true
        type: choice
        options:
          - app-service
          - azure-function
          - both

jobs:
  deploy-app-service:
    name: Build & Deploy PHP app
    runs-on: ubuntu-latest
    if: github.event.inputs.targets == 'app-service' || github.event.inputs.targets == 'both'

    steps:
      # ── 1. Récupération du code ──────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Packaging ZIP ────────────────────────────────────
      - name: Package application
        run: zip app.zip azure-app-service/index.php

      # ── 3. Déploiement sur App Service ───────────────────────
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_APP_NAME_APP_SERVICE }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_APP_SERVICE }}
          package: app.zip

  deploy-azure-function:
    name: Build & Deploy Python Function
    runs-on: ubuntu-latest
    if: github.event.inputs.targets == 'azure-function' || github.event.inputs.targets == 'both'

    steps:
      # ── 1. Récupération du code ──────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Setup Python ──────────────────────────────────────
      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ── 3. Installation des dépendances ──────────────────────
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r azure-function/requirements.txt --target=".python_packages/lib/site-packages"

      # ── 4. Packaging ZIP ────────────────────────────────────
      - name: Package application
        run: cd azure-function && zip -r ../func.zip function_app.py host.json requirements.txt .python_packages/

      # ── 5. Déploiement sur Azure Function ────────────────────
      - name: Deploy to Azure Function
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ secrets.AZURE_APP_NAME_AZURE_FUNCTION }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_AZURE_FUNCTION }}
          package: func.zip