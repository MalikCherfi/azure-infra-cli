name: Deploy to Azure Function

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build & Deploy Python Function
    runs-on: ubuntu-latest

    steps:
      # ── 1. Récupération du code ──────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Setup Python ──────────────────────────────────────
      - name: Setup Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      # ── 3. Installation des dépendances ──────────────────────
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt --target=".python_packages/lib/site-packages"

      # ── 4. Packaging ZIP ────────────────────────────────────
      - name: Package application
        run: zip -r func.zip HttpTrigger/ host.json requirements.txt .python_packages/

      # ── 5. Déploiement sur Azure Function ────────────────────
      - name: Deploy to Azure Function
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ secrets.AZURE_APP_NAME_AZURE_FUNCTION }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_AZURE_FUNCTION }}
          package: func.zip