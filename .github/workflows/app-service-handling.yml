name: App Service Handling

on:
    workflow_dispatch:
        inputs:
            action:
                description: "Action App Service"
                required: true
                type: choice
                options:
                    - create
                    - delete

jobs:
    manage-app-service:
        runs-on: ubuntu-latest
        permissions:
            id-token: write
            contents: read

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Login to Azure
              uses: azure/login@v2
              with:
                  client-id: ${{ secrets.AZURE_CLIENT_ID }}
                  tenant-id: ${{ secrets.AZURE_TENANT_ID }}
                  subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

            - name: Create Web App
              if: github.event.inputs.action == 'create'
              run: |
                  chmod +x azure-app-service/create-azure-app-service.sh
                  ./azure-app-service/create-azure-app-service.sh

            - name: Delete Web App
              if: github.event.inputs.action == 'delete'
              run: |
                  chmod +x azure-app-service/delete-azure-app-service.sh
                  ./azure-app-service/delete-azure-app-service.sh

            - name: Logout
              if: always()
              run: az logout