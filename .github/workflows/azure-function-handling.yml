name: Azure Function Handling

on:
    workflow_dispatch:
        inputs:
            action:
                description: "Action Azure Function"
                required: true
                type: choice
                options:
                    - create
                    - delete

jobs:
    manage-azure-function:
        runs-on: ubuntu-latest
        permissions:
            id-token: write
            contents: read

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Login to Azure
              uses: azure/login@v2
              with:
                  client-id: ${{ secrets.AZURE_CLIENT_ID }}
                  tenant-id: ${{ secrets.AZURE_TENANT_ID }}
                  subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

            - name: Create Function App
              if: github.event.inputs.action == 'create'
              run: |
                  chmod +x azure-function/create-azure-function.sh
                  ./azure-function/create-azure-function.sh

            - name: Delete Function App
              if: github.event.inputs.action == 'delete'
              run: |
                  chmod +x azure-function/delete-azure-function.sh
                  ./azure-function/delete-azure-function.sh

            - name: Logout
              if: always()
              run: az logout